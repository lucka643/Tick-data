<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BTC Tick</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #111;
    color: white;
    font-family: monospace;
    overflow: hidden;
    transition: background 0.05s;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  #price {
    font-size: 12vw;
    font-weight: bold;
  }
  #status {
    position: absolute;
    bottom: 10px;
    left: 10px;
    font-size: 14px;
    opacity: 0.6;
  }
</style>
</head>
<body>
  <div id="price">connecting...</div>
  <div id="status">starting...</div>

<script>
  const priceEl = document.getElementById('price');
  const statusEl = document.getElementById('status');

  let lastPrice = null;
  let tickCount = 0;
  let ws = null;

  function connect() {
    ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');

    ws.onopen = () => {
      statusEl.textContent = 'Binance · connected · waiting for trades...';
    };

    ws.onmessage = (event) => {
      const trade = JSON.parse(event.data);
      const price = parseFloat(trade.p);

      if (lastPrice !== null) {
        if (price > lastPrice) {
          document.body.style.background = '#00c853';
        } else if (price < lastPrice) {
          document.body.style.background = '#d50000';
        }
      }

      priceEl.textContent = '$' + price.toLocaleString('en-US', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });

      lastPrice = price;
      tickCount++;
      statusEl.textContent = 'Binance · BTC · ' + tickCount + ' ticks';
    };

    ws.onclose = () => {
      statusEl.textContent = 'disconnected · reconnecting in 2s...';
      setTimeout(connect, 2000);
    };

    ws.onerror = () => {
      statusEl.textContent = 'connection error';
    };
  }

  connect();
</script>
</body>
</html>
