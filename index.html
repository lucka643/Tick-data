<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BTC Tick</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #111;
    color: white;
    font-family: monospace;
    overflow: hidden;
    transition: background 0.1s;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  #price {
    font-size: 12vw;
    font-weight: bold;
  }
  #status {
    position: absolute;
    bottom: 10px;
    left: 10px;
    font-size: 14px;
    opacity: 0.6;
  }
</style>
</head>
<body>
  <div id="price">loading...</div>
  <div id="status">starting...</div>

<script>
  const priceEl = document.getElementById('price');
  const statusEl = document.getElementById('status');

  let lastPrice = null;
  let lastTradeId = null;
  let tickCount = 0;
  let errorCount = 0;
  let sourceIndex = 0;

  const sources = [
    {
      name: 'Binance',
      url: 'https://api.binance.com/api/v3/trades?symbol=BTCUSDT&limit=1',
      parse: (data) => ({ price: parseFloat(data[0].price), tradeId: data[0].id })
    },
    {
      name: 'Kraken',
      url: 'https://api.kraken.com/0/public/Ticker?pair=XBTUSD',
      parse: (data) => {
        const pair = data.result[Object.keys(data.result)[0]];
        return { price: parseFloat(pair.c[0]), tradeId: pair.c[0] + '_' + Date.now() };
      }
    },
    {
      name: 'CoinGecko',
      url: 'https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd&precision=2',
      parse: (data) => ({ price: data.bitcoin.usd, tradeId: data.bitcoin.usd + '_' + Date.now() })
    }
  ];

  async function pollTick() {
    const source = sources[sourceIndex];
    try {
      const res = await fetch(source.url, { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const { price, tradeId } = source.parse(data);

      if (isNaN(price)) throw new Error('bad price');

      if (lastTradeId !== null && tradeId !== lastTradeId) {
        if (lastPrice !== null) {
          if (price > lastPrice) {
            document.body.style.background = '#00c853';
          } else if (price < lastPrice) {
            document.body.style.background = '#d50000';
          }
        }
        tickCount++;
      }

      priceEl.textContent = '$' + price.toLocaleString('en-US', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });

      lastPrice = price;
      lastTradeId = tradeId;
      errorCount = 0;
      statusEl.textContent = source.name + ' · BTC · ' + tickCount + ' ticks';
    } catch (err) {
      errorCount++;
      statusEl.textContent = source.name + ' failed (' + errorCount + '): ' + err.message;
      if (errorCount >= 3 && sourceIndex < sources.length - 1) {
        sourceIndex++;
        errorCount = 0;
        lastTradeId = null;
        statusEl.textContent = 'switching to ' + sources[sourceIndex].name + '...';
      }
    }
  }

  pollTick();
  setInterval(pollTick, 500);
</script>
</body>
</html>
